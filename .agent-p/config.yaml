version: "0.0.1"

expertise:
  governance:
    max_entries: 100
    warn_entries: 150
    hard_limit: 200
  shelf_life:
    tactical: 14
    observational: 30

search:
  stages:
    treesitter:
      mode: optional
      threshold: 20
      timeout_ms: 500
    bm25:
      enabled: true
      k1: 1.5
      b: 0.75
    jaccard:
      enabled: true
      threshold: 0.1

workflow:
  default: dynamic
  static_override: true
  quick_threshold: 3

memory:
  hot:
    maxSize: 10485760
    ttlMs: 300000
    maxEntries: 1000
  warm:
    maxEntries: 10000
    vacuumInterval: 86400000
  cold:
    maxAgeDays: 30
    archivePath: .agent-p/archives

hooks:
  enabled: true
  preToolUse: true
  postToolUse: true
  sessionStart: true
  stop: true
  notification: true
  policy:
    profile: balanced
    strictMode: false
    escalationThreshold: 0.7
    riskyTools:
      - bash
      - write
      - webfetch
    sensitivePatterns:
      - api_key
      - token
      - password
      - secret
    preToolUseDefaultDecision: allow
    postToolUseDefaultDecision: allow
    stopDefaultDecision: allow
  audit:
    enabled: true
    redactSensitive: true
    maxPreviewChars: 2000

telemetry:
  enabled: true
  traceErrors: true
  sampleRate: 1.0

agents:
  expert:
    enabled: true
    maxRetries: 3
    timeoutMs: 30000
  scout:
    enabled: true
    maxRetries: 2
    timeoutMs: 15000
  builder:
    enabled: true
    maxRetries: 2
    timeoutMs: 30000
  tester:
    enabled: true
    maxRetries: 2
    timeoutMs: 30000
  reviewer:
    enabled: true
    maxRetries: 1
    timeoutMs: 15000
  verifier:
    enabled: true
    maxRetries: 2
    timeoutMs: 20000
